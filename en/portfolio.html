  <style>
    .page-header{padding:18rem 3.5rem 5rem;position:relative;display:flex;align-items:flex-end;justify-content:space-between;gap:2rem;flex-wrap:wrap}
    .page-header::before{content:'';position:absolute;bottom:0;left:3.5rem;right:3.5rem;height:1px;background:var(--border)}
    .page-header-label{font-size:clamp(.72rem,.75vw,.95rem);letter-spacing:.4em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;opacity:0;animation:fadeUp .8s ease .2s forwards}
    .page-header-label::before{content:'';width:1.8rem;height:1px;background:var(--gold)}
    .page-header h1{font-family:'Syncopate',sans-serif;font-size:clamp(3rem,9vw,9rem);font-weight:700;line-height:.9;opacity:0;animation:fadeUp 1s cubic-bezier(.16,1,.3,1) .4s forwards}
    .filter-bar{display:flex;justify-content:center;padding:2.5rem 3.5rem;border-bottom:1px solid var(--border)}
    .filter-btn{padding:.7rem 2.2rem;font-family:'Barlow Condensed',sans-serif;font-size:clamp(.72rem,.8vw,.92rem);letter-spacing:.28em;text-transform:uppercase;color:var(--muted);background:transparent;border:1px solid var(--border);margin-left:-1px;cursor:pointer;transition:color .3s,border-color .3s,background .3s}
    .filter-btn:hover{color:var(--white);border-color:rgba(255,255,255,.2)}
    .filter-btn.active{color:var(--gold);border-color:var(--gold);background:var(--gold-dim);position:relative;z-index:1}
    [data-section].hidden{display:none}
    .portfolio-grid{padding:3px;columns:3;column-gap:3px;background:var(--bg)}
    .portfolio-item{break-inside:avoid;margin-bottom:3px;position:relative;overflow:hidden;cursor:pointer;display:block;background:var(--surface)}
    .portfolio-item img{width:100%;height:auto;display:block;filter:brightness(.9) saturate(.9);transform:scale(1.03);transition:transform .7s cubic-bezier(.16,1,.3,1),filter .5s ease}
    .portfolio-item:hover img{transform:scale(1.08);filter:brightness(.75) saturate(.8)}
    .portfolio-item-overlay{position:absolute;inset:0;border:1px solid transparent;transition:border-color .4s ease;z-index:2;pointer-events:none}
    .portfolio-item:hover .portfolio-item-overlay{border-color:var(--gold)}
    .portfolio-item-expand{position:absolute;bottom:1.5rem;right:1.5rem;width:36px;height:36px;border:1px solid rgba(196,162,74,.6);display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(.8);transition:opacity .3s,transform .3s;z-index:3;pointer-events:none}
    .portfolio-item:hover .portfolio-item-expand{opacity:1;transform:scale(1)}
    .portfolio-item-expand svg{stroke:var(--gold);fill:none}
    .portfolio-video-row{padding:3px 0;background:var(--bg);display:flex;flex-direction:column;align-items:center;gap:1rem;padding-bottom:1.5rem}
    .portfolio-video-solo{width:65%}
    .portfolio-video-pair{display:flex;gap:3px;width:90%}
    .portfolio-video-wrap{position:relative;flex:1;aspect-ratio:16/9;overflow:hidden;background:var(--surface)}
    .portfolio-video-wrap iframe{position:absolute;top:-8%;left:0;width:100%;height:116%;display:block;border:none}
    .video-block-overlay{position:absolute;inset:0;z-index:2;cursor:default}
    .mute-btn{display:flex;align-items:center;gap:.6rem;padding:.5rem 1.2rem;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:clamp(.65rem,.75vw,.82rem);letter-spacing:.25em;text-transform:uppercase;cursor:pointer;transition:border-color .3s,color .3s}
    .mute-btn:hover,.mute-btn.active{border-color:var(--gold);color:var(--gold)}
    .lightbox{position:fixed;inset:0;background:rgba(6,6,10,.97);z-index:5000;display:none;align-items:center;justify-content:center}
    .lightbox.open{display:flex}
    .lightbox-inner{position:relative;max-width:90vw;max-height:90vh;display:flex;align-items:center;justify-content:center}
    .lightbox-inner img{max-width:90vw;max-height:90vh;object-fit:contain;display:block}
    .lightbox-close{position:fixed;top:2rem;right:2.5rem;font-family:'Syncopate',sans-serif;font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:color .3s;z-index:5001;display:flex;align-items:center;gap:.7rem}
    .lightbox-close:hover{color:var(--gold)}
    .lightbox-close svg{stroke:currentColor;fill:none}
    .lightbox-prev,.lightbox-next{position:fixed;top:50%;transform:translateY(-50%);width:52px;height:52px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .3s,background .3s;z-index:5001}
    .lightbox-prev{left:2rem}.lightbox-next{right:2rem}
    .lightbox-prev:hover,.lightbox-next:hover{border-color:var(--gold);background:rgba(196,162,74,.08)}
    .lightbox-prev svg,.lightbox-next svg{stroke:var(--white);fill:none}
    .lightbox-counter{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);font-size:clamp(.6rem,.7vw,.8rem);letter-spacing:.3em;color:var(--muted);z-index:5001}
    .portfolio-cta{padding:8rem 3.5rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:3rem;flex-wrap:wrap}
    .portfolio-cta h2{font-family:'Syncopate',sans-serif;font-size:clamp(1.8rem,4vw,4rem);font-weight:700;line-height:1.05;max-width:16ch}
    .portfolio-cta h2 em{font-style:normal;color:var(--gold)}
    .lang-toggle{display:flex;align-items:center;gap:.35rem;font-family:'Barlow Condensed',sans-serif;font-size:.75rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-left:1.5rem}
    .lang-toggle a{color:var(--muted);text-decoration:none;transition:color .2s}
    .lang-toggle a:hover{color:var(--gold)}
    .lang-toggle a.active{color:var(--warm-white);pointer-events:none}
    .lang-toggle .sep{color:var(--border)}
    @media(max-width:768px){.portfolio-grid{columns:2!important;column-gap:2px;padding:2px}.portfolio-video-pair{flex-direction:column!important;width:100%!important}.portfolio-video-solo{width:100%!important}.filter-bar{padding:1.5rem 1rem}.filter-btn{padding:.6rem 1rem;font-size:.7rem}.portfolio-cta{padding:4rem 1.5rem;flex-direction:column}}
  </style>

  <script>
    var players={};
    var tag=document.createElement('script');tag.src='https://www.youtube.com/iframe_api';document.head.appendChild(tag);
    function onYouTubeIframeAPIReady(){['vid1','vid2','vid6','vid7'].forEach(function(id){var el=document.getElementById(id);if(!el)return;players[id]=new YT.Player(id,{events:{onReady:function(e){e.target.playVideo();}}});});}
    function filterPortfolio(type){document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.toggle('active',b.dataset.filter===type);});document.querySelectorAll('[data-section]').forEach(function(el){if(type==='all'){el.classList.remove('hidden');}else{el.classList.toggle('hidden',el.dataset.section!==type);}});}
    function toggleMute(btn){const row=btn.closest('.portfolio-video-row');const frames=row.querySelectorAll('iframe');const unmute=!btn.classList.contains('active');frames.forEach(function(iframe){var p=players[iframe.id];if(!p)return;unmute?p.unMute():p.mute();});btn.classList.toggle('active');btn.querySelector('.icon-muted').style.display=unmute?'none':'block';btn.querySelector('.icon-sound').style.display=unmute?'block':'none';}
    const lb=document.getElementById('lightbox'),lbInner=document.getElementById('lbInner'),lbClose=document.getElementById('lbClose'),lbPrev=document.getElementById('lbPrev'),lbNext=document.getElementById('lbNext'),lbCounter=document.getElementById('lbCounter');
    const items=Array.from(document.querySelectorAll('.portfolio-item'));let current=0;
    function openLightbox(i){current=i;renderLightbox();lb.classList.add('open');document.body.style.overflow='hidden';}
    function closeLightbox(){lb.classList.remove('open');lbInner.innerHTML='';document.body.style.overflow='';}
    function renderLightbox(){const item=items[current];lbInner.innerHTML='';const img=item.querySelector('img');const ni=document.createElement('img');ni.src=img.src;ni.alt=img.alt;lbInner.appendChild(ni);const ph=items.filter(i=>i.dataset.type==='photo');const pi=ph.indexOf(item);lbCounter.textContent=(pi+1)+' / '+ph.length;lbPrev.style.display='flex';lbNext.style.display='flex';lbCounter.style.display='block';}
    function navigate(dir){const ph=items.filter(i=>i.dataset.type==='photo');const cp=ph.findIndex(i=>parseInt(i.dataset.index)===current);const np=(cp+dir+ph.length)%ph.length;current=parseInt(ph[np].dataset.index);renderLightbox();}
    items.forEach(item=>{item.addEventListener('click',()=>openLightbox(parseInt(item.dataset.index)));});
    lbClose.addEventListener('click',closeLightbox);lbPrev.addEventListener('click',()=>navigate(-1));lbNext.addEventListener('click',()=>navigate(1));
    lb.addEventListener('click',e=>{if(e.target===lb)closeLightbox();});
    document.addEventListener('keydown',e=>{if(!lb.classList.contains('open'))return;if(e.key==='Escape')closeLightbox();if(e.key==='ArrowLeft')navigate(-1);if(e.key==='ArrowRight')navigate(1);});
  </script>
