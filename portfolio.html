  <style>
    /* ── PAGE HEADER ──────────────────────────────────────── */
    .page-header {
      padding: 18rem 3.5rem 5rem;
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .page-header::before {
      content: '';
      position: absolute;
      bottom: 0; left: 3.5rem; right: 3.5rem;
      height: 1px;
      background: var(--border);
    }

    .page-header-label {
      font-size: clamp(0.72rem, 0.75vw, 0.95rem);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.2s forwards;
    }

    .page-header-label::before {
      content: '';
      width: 1.8rem; height: 1px;
      background: var(--gold);
    }

    .page-header h1 {
      font-family: 'Syncopate', sans-serif;
      font-size: clamp(3rem, 9vw, 9rem);
      font-weight: 700;
      line-height: 0.9;
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
    }

    .page-header-count {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1rem, 2vw, 2rem);
      font-weight: 300;
      color: var(--muted);
      opacity: 0;
      animation: fadeUp 0.8s ease 0.6s forwards;
      padding-bottom: 0.5rem;
    }

    .page-header-count span { color: var(--gold); }

    /* ── MASONRY GRID ─────────────────────────────────────── */
    .portfolio-grid {
      padding: 3px;
      columns: 3;
      column-gap: 3px;
      background: var(--bg);
    }

    .portfolio-item {
      break-inside: avoid;
      margin-bottom: 3px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      display: block;
      background: var(--surface);
    }

    .portfolio-item img {
      width: 100%;
      height: auto;
      display: block;
      filter: brightness(0.9) saturate(0.9);
      transform: scale(1.03);
      transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1), filter 0.5s ease;
    }

    .portfolio-item:hover img {
      transform: scale(1.08);
      filter: brightness(0.75) saturate(0.8);
    }

    /* Hover overlay */
    .portfolio-item-overlay {
      position: absolute;
      inset: 0;
      border: 1px solid transparent;
      transition: border-color 0.4s ease;
      z-index: 2;
      pointer-events: none;
    }

    .portfolio-item:hover .portfolio-item-overlay {
      border-color: var(--gold);
    }

    /* Expand icon */
    .portfolio-item-expand {
      position: absolute;
      bottom: 1.5rem; right: 1.5rem;
      width: 36px; height: 36px;
      border: 1px solid rgba(196, 162, 74, 0.6);
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transform: scale(0.8);
      transition: opacity 0.3s, transform 0.3s;
      z-index: 3;
      pointer-events: none;
    }

    .portfolio-item:hover .portfolio-item-expand {
      opacity: 1;
      transform: scale(1);
    }

    .portfolio-item-expand svg { stroke: var(--gold); fill: none; }

    /* ── VIDEO ITEMS ──────────────────────────────────────── */
    .portfolio-item.is-video .play-btn {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      width: 64px; height: 64px;
      border: 2px solid var(--gold);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.3s, background 0.3s;
      z-index: 3;
    }

    .portfolio-item.is-video:hover .play-btn {
      transform: translate(-50%, -50%) scale(1.1);
      background: rgba(196, 162, 74, 0.15);
    }

    .portfolio-item.is-video .play-btn svg {
      stroke: none;
      fill: var(--gold);
      margin-left: 4px;
    }

    /* ── LIGHTBOX ─────────────────────────────────────────── */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(6, 6, 10, 0.97);
      z-index: 5000;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .lightbox.open { display: flex; }

    .lightbox-inner {
      position: relative;
      max-width: 90vw;
      max-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox-inner img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      display: block;
    }

    /* Video in lightbox */
    .lightbox-video {
      width: min(85vw, 1200px);
      aspect-ratio: 16/9;
    }

    .lightbox-video iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Close button */
    .lightbox-close {
      position: fixed;
      top: 2rem; right: 2.5rem;
      font-family: 'Syncopate', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.3s;
      z-index: 5001;
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    .lightbox-close:hover { color: var(--gold); }

    .lightbox-close svg { stroke: currentColor; fill: none; }

    /* Prev / Next */
    .lightbox-prev,
    .lightbox-next {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 52px; height: 52px;
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: border-color 0.3s, background 0.3s;
      z-index: 5001;
    }

    .lightbox-prev { left: 2rem; }
    .lightbox-next { right: 2rem; }

    .lightbox-prev:hover,
    .lightbox-next:hover {
      border-color: var(--gold);
      background: rgba(196, 162, 74, 0.08);
    }

    .lightbox-prev svg,
    .lightbox-next svg { stroke: var(--white); fill: none; }

    /* Counter */
    .lightbox-counter {
      position: fixed;
      bottom: 2rem; left: 50%;
      transform: translateX(-50%);
      font-size: clamp(0.6rem, 0.7vw, 0.8rem);
      letter-spacing: 0.3em;
      color: var(--muted);
      z-index: 5001;
    }

    /* ── CTA ──────────────────────────────────────────────── */
    .portfolio-cta {
      padding: 8rem 3.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 3rem;

    }

    .portfolio-cta h2 {

      font-size: clamp(1.8rem, 4vw, 4rem);
      font-weight: 700;
      line-height: 1.05;
      max-width: 16ch;
    }

    .portfolio-cta h2 em { font-style: normal; color: var(--gold); }

  <script>
    // ── LIGHTBOX ─────────────────────────────────────────────
    const lb        = document.getElementById('lightbox');
    const lbInner   = document.getElementById('lbInner');
    const lbClose   = document.getElementById('lbClose');
    const lbPrev    = document.getElementById('lbPrev');
    const lbNext    = document.getElementById('lbNext');
    const lbCounter = document.getElementById('lbCounter');

    const items = Array.from(document.querySelectorAll('.portfolio-item'));
    let current = 0;

    function openLightbox(index) {
      current = index;
      renderLightbox();
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lb.classList.remove('open');
      lbInner.innerHTML = '';
      document.body.style.overflow = '';
    }

    function renderLightbox() {
      const item = items[current];
      const type = item.dataset.type;
      lbInner.innerHTML = '';

      if (type === 'video') {
        const videoId = item.dataset.videoId;
        const wrap = document.createElement('div');
        wrap.className = 'lightbox-video';
        wrap.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
        lbInner.appendChild(wrap);
        lbPrev.style.display = 'none';
        lbNext.style.display = 'none';
        lbCounter.style.display = 'none';
      } else {
        const img = item.querySelector('img');
        const newImg = document.createElement('img');
        newImg.src = img.src;
        newImg.alt = img.alt;
        lbInner.appendChild(newImg);

        // Show only photo navigation
        const photoItems = items.filter(i => i.dataset.type === 'photo');
        const photoIndex = photoItems.indexOf(item);
        lbCounter.textContent = `${photoIndex + 1} / ${photoItems.length}`;
        lbPrev.style.display = 'flex';
        lbNext.style.display = 'flex';
        lbCounter.style.display = 'block';
      }
    }

    function navigate(dir) {
      // Navigate only through photos
      const photoItems = items.filter(i => i.dataset.type === 'photo');
      const currentPhoto = photoItems.findIndex(i => parseInt(i.dataset.index) === current);
      const nextPhoto = (currentPhoto + dir + photoItems.length) % photoItems.length;
      current = parseInt(photoItems[nextPhoto].dataset.index);
      renderLightbox();
    }

    // Open on click
    items.forEach(item => {
      item.addEventListener('click', () => openLightbox(parseInt(item.dataset.index)));
    });

    lbClose.addEventListener('click', closeLightbox);
    lbPrev.addEventListener('click', () => navigate(-1));
    lbNext.addEventListener('click', () => navigate(1));

    // Close on backdrop click
    lb.addEventListener('click', e => {
      if (e.target === lb) closeLightbox();
    });

    // Keyboard navigation
    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft')  navigate(-1);
      if (e.key === 'ArrowRight') navigate(1);
    });
  </script>

</body>
</html>
